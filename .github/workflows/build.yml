name: Build Mutu PDF APK

# ── কখন run হবে ──────────────────────────────
on:
  push:
    branches: [ main ]        # main branch এ push করলেই build শুরু
  workflow_dispatch:           # manually trigger করা যাবে

# ── Build job ─────────────────────────────────
jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest    # GitHub এর free Linux server

    steps:

      # 1. Code checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java 17 setup (Android build এর জন্য দরকার)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Gradle setup (gradlew-jar ছাড়াই কাজ করে)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      # 4. APK build করো (debug version)
      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      # 5. APK টা download করার জন্য upload করো
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MutuPDF-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30    # 30 দিন রাখবে
